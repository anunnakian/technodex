<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4BGFNHTLQH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-4BGFNHTLQH');
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/main.css" />
    <link rel="icon" href="./assets/icons/default/icon.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>Technodex</title>
  </head>
  <body>
    <div id="page">
      <div class="header">
        <div class="logo">
          <img class="img" src="./assets/icons/default/icon.png" alt="Technodex logo" />
          <span class="header-title">Technodex</span>
        </div>

        <div class="box" role="search">
          <label for="searchbar" class="sr-only">Search frameworks</label>
          <input
            id="searchbar"
            oninput="search_frameworks()"
            type="text"
            placeholder="Search frameworks and tools…"
          />
        </div>
      </div>

      <div class="toolbar">
        <div class="toolbar-left">
          <div class="filter-bar" id="filterBar" role="group" aria-label="Filter by category">
            <button class="filter-btn active" data-category="all">All</button>
          </div>
        </div>
        <div class="toolbar-right">
          <span id="toolCount" class="tool-count"></span>
          <div class="toolbar-divider"></div>
          <label for="sortSelect" class="sr-only">Sort by</label>
          <select id="sortSelect" class="sort-select" aria-label="Sort frameworks">
            <option value="default">Default</option>
            <option value="az">Name A → Z</option>
            <option value="za">Name Z → A</option>
            <option value="year-asc">Oldest first</option>
            <option value="year-desc">Newest first</option>
            <option value="status">Status</option>
          </select>
        </div>
      </div>

      <div class="framework-grid" id="framework-grid"></div>
      <div id="search-results" class="search-results" style="display:none;"></div>
      <div class="lds-ring" role="status" aria-label="Loading frameworks">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
      </div>
      <button id="scrollToTopBtn" aria-label="Scroll to top"><i class="fas fa-chevron-up" aria-hidden="true"></i></button>
      <button id="scrollToDownBtn" aria-label="Scroll to bottom"><i class="fas fa-chevron-down" aria-hidden="true"></i></button>
    </div>

    <!-- Comparison tray -->
    <div id="compareTray" class="compare-tray" aria-live="polite" hidden>
      <div class="compare-tray-inner">
        <span class="compare-tray-label">Compare:</span>
        <div id="compareSlots" class="compare-slots"></div>
        <button id="compareBtn" class="compare-go-btn" disabled>Compare</button>
        <button id="compareClearBtn" class="compare-clear-btn" aria-label="Clear comparison">✕</button>
      </div>
    </div>

    <!-- Comparison modal -->
    <div id="compareModal" class="compare-modal" hidden role="dialog" aria-modal="true" aria-label="Framework comparison">
      <div class="compare-modal-inner">
        <button class="compare-modal-close" id="compareModalClose" aria-label="Close comparison">✕</button>
        <div id="compareModalContent" class="compare-modal-content"></div>
      </div>
    </div>

    <footer class="site-footer" role="contentinfo">
        <div class="footer-content">
            <div class="footer-info">
                <p class="footer-text">
                    Created with ❤️ by <strong>Thoth Technologies</strong>
                </p>
                <p class="footer-copyright">
                    © 2025 Thoth Technologies. All rights reserved.
                </p>
            </div>
        </div>
    </footer>

<script src="./js/main.js"></script>
    <script src="https://kit.fontawesome.com/919bc986f5.js" crossorigin="anonymous"></script>

  </body>
</html>
