<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/main.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
    />
    <link rel="icon" href="./assets/icons/default/icon.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>Technodex</title>
  </head>
  <body>
    <div id="page">
      <div class="header">

        <div class="logo">
          <img class="img" src="./assets/icons/default/icon.png" alt="logo" />
          <span class="header-title">Technodex</span>
        </div>

        <div class="box">
          <input
            id="searchbar"
            onkeyup="search_pokemon()"
            type="text"
            placeholder="Search frameworks…"
          />
        </div>

      </div>

      <div class="poke-container" id="poke-container"></div>
      <div id="search-results" class="search-results" style="display:none;"></div>
      <div class="lds-ring">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
      </div>
      <button id="scrollToTopBtn"><i class="fas fa-chevron-up"></i></button>
      <button id="scrollToDownBtn"><i class="fas fa-chevron-down"></i></button>
    </div>

    <footer class="site-footer" role="contentinfo">
        <div class="footer-content">
            <div class="footer-info">
                <p class="footer-text">
                    Created with ❤️ by <strong>Thoth Technologies</strong>
                </p>
                <p class="footer-copyright">
                    © 2025 Thoth Technologies. All rights reserved.
                </p>
            </div>
        </div>
    </footer>

    <!-- Design inspired by this Dribbble shot: https://dribbble.com/shots/5611109--Pokemon -->
    <script src="./js/main.js"></script>
    <script src="https://kit.fontawesome.com/919bc986f5.js" crossorigin="anonymous"></script>

  </body>
</html>
