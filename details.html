<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./assets/icons/default/icon.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>Technodex — Framework Details</title>
    <link rel="stylesheet" href="./css/details.css">
</head>
<body>
    <div id="pokemon-details">
    </div>

    <div class="details">
    <div class="tabs" role="tablist">
        <span id="tab-1-label" role="tab" aria-selected="true" aria-controls="tab_1" tabindex="0" data-tab-value="#tab_1">Overview</span>
        <span id="tab-2-label" role="tab" aria-selected="false" aria-controls="tab_2" tabindex="0" data-tab-value="#tab_2">Details</span>
        <span id="tab-3-label" role="tab" aria-selected="false" aria-controls="tab_3" tabindex="0" data-tab-value="#tab_3">Related</span>
    </div>

    <div id="tab-content">
        <div class="tabs__tab active" id="tab_1" data-tab-info role="tabpanel" aria-labelledby="tab-1-label">
        </div>
        <div class="tabs__tab" id="tab_2" data-tab-info role="tabpanel" aria-labelledby="tab-2-label">
        </div>
        <div class="tabs__tab" id="tab_3" data-tab-info role="tabpanel" aria-labelledby="tab-3-label">
        </div>
    </div>
    </div>

<!-- preloader -->
<div class="loader-wrapper">
    <div class="loader"></div>
    <div class="loader-section section-left"></div>
    <div class="loader-section section-right"></div>
</div>

    <script src="./js/details.js"></script>
</body>
</html>
